spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/social
    username: postgres
    password: 123456
  security:
    user:
      name: admin
      password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080
  error:
    include-message: always